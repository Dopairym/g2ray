name: Get VLESS Link

on:
  workflow_dispatch:
    inputs:
      codespace_name:
        description: 'Codespace name (e.g. fictional-succotash-v6gx4w5x7j4f949)'
        required: true
        type: string

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.CODESPACE_READ_TOKEN }}" | gh auth login --with-token

      - name: Execute start script inside codespace and get full output
        run: |
          gh codespace ssh -c "${{ github.event.inputs.codespace_name }}" \
            --command "/usr/local/bin/start-xray.sh"
